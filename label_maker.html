<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสร้างใบจ่าหน้าพัสดุ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        
        /* บังคับให้พิมพ์พื้นหลังสี (Black background for Sender/Receiver tags) */
        .print-bg-black {
            background-color: black !important;
            color: white !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* สไตล์สำหรับการพิมพ์ใบจ่าหน้าขนาด 100x150 มม. */
        @media print {
            @page {
                size: 100mm 150mm;
                margin: 0;
            }
            html, body {
                width: 100mm;
                height: 150mm;
                background-color: white;
            }
            .no-print {
                display: none !important;
            }
            #print-preview {
                display: block !important;
                position: absolute !important;
                top: 0;
                left: 0;
                width: 100mm !important;
                height: 150mm !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            #label-container {
                width: 100mm !important;
                height: 150mm !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                overflow: hidden;
            }
        }

        /* เอฟเฟกต์ Fade-in สำหรับ UI */
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="app" class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden no-print">
    <!-- Header -->
    <div class="bg-blue-600 p-6 text-white text-center">
        <h1 class="text-2xl font-bold">ระบบสร้างใบจ่าหน้าพัสดุ</h1>
        <p class="text-blue-100 text-sm mt-1">จัดการส่งของได้ง่ายๆ ในที่เดียว</p>
    </div>

    <!-- Step 1: ข้อมูลผู้ส่ง -->
    <div id="step-sender" class="p-6">
        <h2 class="text-xl font-semibold mb-4 flex items-center">
            <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center mr-2 text-sm">1</span>
            ข้อมูลผู้ส่ง
        </h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ชื่อ-นามสกุล หรือ ชื่อร้าน</label>
                <input type="text" id="sender-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" placeholder="ระบุชื่อผู้ส่ง">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">ที่อยู่</label>
                <textarea id="sender-address" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" placeholder="บ้านเลขที่, ถนน, ตำบล, อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">เบอร์โทรติดต่อ</label>
                <input type="tel" id="sender-tel" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" placeholder="0xx-xxx-xxxx">
            </div>
            <button onclick="saveSender()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200">บันทึกข้อมูลผู้ส่ง</button>
        </div>
    </div>

    <!-- Step 2: ข้อมูลผู้รับ -->
    <div id="step-receiver" class="hidden p-6 animate-fade-in">
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6 flex justify-between items-start">
            <div>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">ผู้ส่ง (Sender)</p>
                <p id="display-sender-name" class="font-bold text-gray-800 text-lg"></p>
                <p id="display-sender-address" class="text-sm text-gray-600"></p>
                <p id="display-sender-tel" class="text-sm text-gray-600 font-medium"></p>
            </div>
            <button onclick="editSender()" class="bg-white border border-blue-200 text-blue-600 px-3 py-1 rounded-md text-sm font-medium hover:bg-blue-50 transition">แก้ไข</button>
        </div>

        <h2 class="text-xl font-semibold mb-4 flex items-center">
            <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center mr-2 text-sm">2</span>
            ข้อมูลผู้รับ
        </h2>

        <div class="mb-6">
            <button onclick="openContactModal()" class="w-full border-2 border-dashed border-blue-300 text-blue-600 py-4 rounded-xl hover:bg-blue-50 flex items-center justify-center transition group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 group-hover:scale-110 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                เลือกจากสมุดรายชื่อ
            </button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ชื่อ-นามสกุล</label>
                <input type="text" id="receiver-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">ที่อยู่ (พร้อมรหัสไปรษณีย์)</label>
                <textarea id="receiver-address" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" placeholder="ระบุที่อยู่และรหัสไปรษณีย์ให้ชัดเจน"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">เบอร์โทรติดต่อ</label>
                <input type="tel" id="receiver-tel" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 pt-2">
                <button onclick="saveToContact()" class="w-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-medium py-3 rounded-lg hover:bg-emerald-100 transition">บันทึกลง Contact List</button>
                <button onclick="generateLabel()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-lg transition">สร้างใบจ่าหน้า</button>
            </div>
        </div>
    </div>
</div>

<!-- Preview Modal สำหรับพิมพ์ -->
<div id="print-preview" class="hidden fixed inset-0 bg-white z-[100] flex flex-col items-center overflow-y-auto py-10 no-print">
    <div id="label-container" class="bg-white border border-gray-300 shadow-2xl" style="width: 100mm; height: 150mm; min-width: 100mm; min-height: 150mm;">
        <!-- เนื้อหาใบจ่าหน้าจะถูกใส่ที่นี่ -->
    </div>
    
    <div class="mt-8 flex space-x-4 no-print pb-10">
        <button onclick="window.print()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold text-lg shadow-xl hover:bg-blue-700 transition">พิมพ์ใบจ่าหน้า (PDF)</button>
        <button onclick="closePreview()" class="bg-gray-100 text-gray-600 px-10 py-3 rounded-xl font-bold text-lg hover:bg-gray-200 transition">กลับไปแก้ไข</button>
    </div>
</div>

<!-- Modal สมุดรายชื่อ -->
<div id="contact-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 no-print">
    <div class="bg-white rounded-2xl w-full max-w-lg max-h-[80vh] overflow-hidden flex flex-col shadow-2xl">
        <div class="p-4 border-b flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-lg text-gray-800">เลือกจากรายชื่อ</h3>
            <button onclick="closeContactModal()" class="text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="overflow-y-auto p-4 space-y-3" id="contact-list-container"></div>
    </div>
</div>

<div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full shadow-2xl transition-opacity duration-300 opacity-0 pointer-events-none no-print">
    บันทึกข้อมูลเรียบร้อยแล้ว
</div>

<script>
    let senderData = JSON.parse(localStorage.getItem('senderData')) || null;
    const defaultTitle = "ระบบสร้างใบจ่าหน้าพัสดุ";

    const mockGoogleSheetContacts = [
        { name: "คุณสุกัญญา มั่นคง", address: "99/1 หมู่บ้านร่มเย็น ถ.รามอินทรา แขวงอนุสาวรีย์ เขตบางเขน กทม. 10220", tel: "081-222-3333" },
        { name: "นายสมชาย ขายดี", address: "123 ตึกพาณิชย์ ชั้น 2 ถ.เจริญกรุง แขวงวัดกัลยา เขตธนบุรี กทม. 10600", tel: "090-123-4567" },
        { name: "บจก. ไทยมาร์ท", address: "55 ซอยอารีย์ ถ.พหลโยธิน แขวงสามเสนใน เขตพญาไท กรุงเทพฯ 10400", tel: "02-111-2222" }
    ];

    window.onload = function() {
        if (senderData) {
            document.getElementById('sender-name').value = senderData.name || '';
            document.getElementById('sender-address').value = senderData.address || '';
            document.getElementById('sender-tel').value = senderData.tel || '';
            goToReceiverPage();
        }
    };

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.remove('opacity-0');
        setTimeout(() => toast.classList.add('opacity-0'), 3000);
    }

    function saveSender() {
        const name = document.getElementById('sender-name').value;
        const address = document.getElementById('sender-address').value;
        const tel = document.getElementById('sender-tel').value;
        if(!name || !address || !tel) return showToast("กรุณากรอกข้อมูลผู้ส่งให้ครบถ้วน");
        senderData = { name, address, tel };
        localStorage.setItem('senderData', JSON.stringify(senderData));
        goToReceiverPage();
    }

    function goToReceiverPage() {
        document.getElementById('display-sender-name').innerText = senderData.name;
        document.getElementById('display-sender-address').innerText = senderData.address;
        document.getElementById('display-sender-tel').innerText = senderData.tel;
        document.getElementById('step-sender').classList.add('hidden');
        document.getElementById('step-receiver').classList.remove('hidden');
    }

    function editSender() {
        document.getElementById('step-sender').classList.remove('hidden');
        document.getElementById('step-receiver').classList.add('hidden');
    }

    function openContactModal() {
        document.getElementById('contact-modal').classList.remove('hidden');
        renderContactList();
    }

    function closeContactModal() {
        document.getElementById('contact-modal').classList.add('hidden');
    }

    function renderContactList() {
        const container = document.getElementById('contact-list-container');
        container.innerHTML = '';
        mockGoogleSheetContacts.forEach((contact) => {
            const div = document.createElement('div');
            div.className = "p-4 border-2 rounded-xl hover:bg-blue-50 cursor-pointer transition border-gray-100";
            div.innerHTML = `<p class="font-bold text-gray-800">${contact.name}</p><p class="text-xs text-gray-500">${contact.address}</p>`;
            div.onclick = () => {
                document.getElementById('receiver-name').value = contact.name;
                document.getElementById('receiver-address').value = contact.address;
                document.getElementById('receiver-tel').value = contact.tel;
                closeContactModal();
            };
            container.appendChild(div);
        });
    }

    function saveToContact() { showToast("บันทึกข้อมูลลง Contact List แล้ว"); }

    function extractZip(address) {
        const zipMatch = address.match(/\d{5}/);
        return zipMatch ? zipMatch[0] : "";
    }

    function closePreview() {
        document.title = defaultTitle; // คืนค่าชื่อ Title เดิม
        document.getElementById('print-preview').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
    }

    function generateLabel() {
        const rName = document.getElementById('receiver-name').value;
        const rAddress = document.getElementById('receiver-address').value;
        const rTel = document.getElementById('receiver-tel').value;

        if(!rName || !rAddress || !rTel) return showToast("กรุณากรอกข้อมูลผู้รับให้ครบถ้วน");

        // ตั้งชื่อ document.title เป็นชื่อผู้รับเพื่อให้เบราว์เซอร์นำไปตั้งชื่อไฟล์ PDF
        document.title = rName;

        const zipCode = extractZip(rAddress);
        const container = document.getElementById('label-container');
        
        container.innerHTML = `
            <div class="h-full flex flex-col p-4 border-[2px] border-black bg-white" style="width: 100mm; height: 150mm; min-width: 100mm; min-height: 150mm;">
                <!-- SENDER -->
                <div>
                    <div class="flex items-center space-x-2">
                        <span class="print-bg-black text-white text-[12px] px-2 font-bold py-0.5">ผู้ส่ง/SENDER</span>
                        <span class="text-[14px] font-bold">โทร: ${senderData.tel}</span>
                    </div>
                    <div class="mt-2 ml-1">
                        <p class="text-[16px] font-bold leading-tight">${senderData.name}</p>
                        <p class="text-[13px] leading-snug mt-1">${senderData.address}</p>
                        <p class="text-[11px] font-medium mt-1 text-gray-700">(หากไม่มีผู้รับตามจ่าหน้า กรุณานำส่งกลับคืนผู้ส่ง)</p>
                    </div>
                </div>

                <!-- LINE -->
                <div class="border-t-2 border-dashed border-black mt-3 mb-4"></div>

                <!-- RECEIVER -->
                <div class="flex-grow">
                    <div class="flex items-center space-x-2">
                        <span class="print-bg-black text-white text-[14px] px-3 font-bold py-1">ผู้รับ/RECEIVER</span>
                        <span class="text-[18px] font-extrabold underline">โทร: ${rTel}</span>
                    </div>
                    <div class="mt-4 ml-1">
                        <p class="text-[22px] font-bold leading-tight mb-2">${rName}</p>
                        <p class="text-[16px] leading-relaxed">${rAddress}</p>
                        
                        <!-- ZIP CODE -->
                        <div class="mt-8">
                            <p class="text-[16px] font-bold uppercase">รหัสไปรษณีย์</p>
                            <div class="text-[32px] font-black tracking-[8px]">
                                ${zipCode}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- BOTTOM INFO -->
                <div class="mt-auto pt-2">
                </div>
            </div>
        `;

        document.getElementById('app').classList.add('hidden');
        document.getElementById('print-preview').classList.remove('hidden');
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
